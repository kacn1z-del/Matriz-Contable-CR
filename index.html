<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Matriz Contable CR v12</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #f0faf2; --bg2: #ffffff; --header: #e6f7ea;
  --primary: #5abf2a; --accent: #1a7a00;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); }

.header { position:sticky; top:0; background:white; border-bottom:2px solid #ddd; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; z-index:100; }
#sheetTabs { display:flex; overflow-x:auto; background:#f8f9fa; padding:8px 0; border-bottom:1px solid #ddd; }
#sheetTabs button { padding:10px 20px; margin:0 4px; border:none; background:#fff; border:1px solid #ddd; border-radius:6px 6px 0 0; white-space:nowrap; }
#sheetTabs button.active { background:var(--header); border-bottom:3px solid var(--primary); font-weight:600; }

.formula-bar { background:#f8f9fa; padding:10px 16px; border-bottom:1px solid #ddd; display:flex; align-items:center; gap:10px; }
#formulaInput { flex:1; padding:10px; border:1px solid #ccc; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:15px; }

#canvas { background:white; padding:0; overflow:auto; height:calc(100vh - 220px); }
.table { border-collapse:collapse; font-size:15px; width:100%; table-layout:fixed; }
.table th { background:#f1f3f5; position:sticky; top:0; z-index:10; padding:8px; text-align:center; border:1px solid #ddd; font-weight:600; }
.table td { padding:8px 10px; border:1px solid #ddd; min-width:100px; height:32px; }
.table td[contenteditable="true"]:focus { outline:2px solid #5abf2a; background:#fff; }
</style>
</head>
<body>

<div class="header">
  <h1>Matriz Contable CR v12</h1>
  <select id="langSelect"><option value="es">Español</option></select>
</div>

<div id="sheetTabs"></div>

<div class="formula-bar">
  <span style="font-weight:700;color:var(--primary);">fx</span>
  <input type="text" id="formulaInput" placeholder="Escribe fórmula aquí (ej: =SUMA(C2:C10))">
</div>

<div id="canvas"></div>

<script>
// ==================== MOTOR + TODO LO ANTERIOR ====================
let sheets = {};
let currentSheetName = "Hoja1";

const canvas = document.getElementById('canvas');

function createSheet(name) {
  const table = document.createElement('table');
  table.className = 'table';
  table.innerHTML = `
    <thead>
      <tr><th></th><th>A</th><th>B</th><th>C</th><th>D</th><th>E</th><th>F</th></tr>
    </thead>
    <tbody contenteditable="true">
      <tr><td>1</td><td>=HOY()</td><td>Venta</td><td>50000</td><td>=IVA(C2)</td><td>=C2+D2</td><td></td></tr>
      <tr><td>2</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    </tbody>`;
  return table;
}

function renderTabs() {
  let html = '';
  Object.keys(sheets).forEach(name => {
    html += `<button onclick="switchSheet('${name}')" class="${name===currentSheetName ? 'active' : ''}">${name}</button>`;
  });
  html += `<button onclick="addNewSheet()" style="border-style:dashed;color:var(--primary);">+ Hoja</button>`;
  document.getElementById('sheetTabs').innerHTML = html;
}

function switchSheet(name) {
  currentSheetName = name;
  canvas.innerHTML = '';
  canvas.appendChild(sheets[name]);
  renderTabs();
}

function addNewSheet() {
  const name = `Hoja${Object.keys(sheets).length + 1}`;
  const newTable = createSheet(name);
  sheets[name] = newTable;
  switchSheet(name);
}

function saveData() {
  localStorage.setItem('matriz_v12', JSON.stringify({sheets: Object.keys(sheets), current: currentSheetName}));
}

function loadData() {
  const saved = localStorage.getItem('matriz_v12');
  if (saved) {
    const data = JSON.parse(saved);
    // Por simplicidad recreamos las hojas (puedes expandir)
  }
  if (Object.keys(sheets).length === 0) {
    sheets["Hoja1"] = createSheet("Hoja1");
    canvas.appendChild(sheets["Hoja1"]);
  }
  renderTabs();
}

// Eventos
canvas.addEventListener('input', () => {
  processFormulas(sheets[currentSheetName]);
  saveData();
});

document.getElementById('formulaInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') {
    const active = document.activeElement;
    if (active && active.tagName === 'TD') active.textContent = e.target.value;
  }
});

document.getElementById('btnExportar').addEventListener('click', () => {
  const wb = XLSX.utils.book_new();
  Object.keys(sheets).forEach(name => {
    const ws = XLSX.utils.table_to_sheet(sheets[name]);
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, 'Matriz_Contable.xlsx');
});

// Inicializar
loadData();
</script>
</body>
</html>
