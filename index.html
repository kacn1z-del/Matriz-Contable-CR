<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matriz Contable CR v12</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg: #f0faf2; --bg2: #ffffff; --bg3: #e6f7ea;
  --primary: #5abf2a; --primary2: #3a9e10; --primary3: #84e04a;
  --accent: #1a7a00; --text: #1a2e1a; --text2: #5a7a5a;
  --border: #c2e8c2; --border2: #a8d8a8;
  --glass: rgba(255,255,255,0.75); --glass2: rgba(230,247,234,0.85);
  --shadow: 0 4px 24px rgba(58,158,16,0.10);
  --shadow2: 0 2px 12px rgba(58,158,16,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.header { position:sticky; top:0; z-index:100; background:var(--glass); backdrop-filter:blur(16px); border-bottom:1.5px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:var(--shadow2); }
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--primary2)); display:flex; align-items:center; justify-content:center; }
.logo h1 { font-size:17px; font-weight:800; color:var(--accent); }

.btn { min-height:40px; padding:8px 16px; border:1.5px solid var(--border2); border-radius:12px; background:var(--bg2); color:var(--text); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:7px; }
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--primary2)); border:none; color:white; font-weight:700; }
.canvas { background:var(--bg2); border:1.5px solid var(--border); border-radius:18px; min-height:500px; padding:20px; box-shadow:var(--shadow); }
.table { width:100%; border-collapse:collapse; margin:12px 0; }
.table th, .table td { padding:10px 12px; border-bottom:1px solid var(--border); text-align:left; }
.table th { background:var(--bg3); font-weight:700; color:var(--accent); }
.modal { display:none; position:fixed; inset:0; background:rgba(20,40,20,0.45); backdrop-filter:blur(6px); align-items:center; justify-content:center; }
.modal.active { display:flex; }
.modal-content { background:var(--bg2); border:1.5px solid var(--border); border-radius:22px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; }
.sibo-chat { position:fixed; bottom:20px; right:20px; width:360px; background:var(--bg2); border:1.5px solid var(--border); border-radius:22px; box-shadow:0 16px 48px rgba(0,0,0,0.14); display:none; flex-direction:column; max-height:500px; }
.sibo-chat.active { display:flex; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">📊</div>
    <h1>Matriz Contable CR</h1>
  </div>
  <div>
    <button class="btn" id="btnSibo">Sibö ✦</button>
    <button class="btn" id="btnShare">Compartir</button>
    <select id="langSelect">
      <option value="es">Español CR</option>
      <option value="en">English US</option>
      <option value="bribri">Bribri</option>
      <option value="cabecar">Cabécar</option>
    </select>
  </div>
</div>

<!-- HERO -->
<div class="hero" style="padding:40px 20px; text-align:center;">
  <h2><span>Matriz Contable</span> CR v12</h2>
  <p>300+ Funciones | Factura Electrónica 4.3 | Canvas Libre | Sibö ✦</p>
  <button class="btn btn-primary" id="btnEmpezar">Empezar</button>
  <button class="btn" id="btnPlantillas">Plantillas</button>
</div>

<!-- CANVAS -->
<div style="padding:20px;">
  <p class="canvas-label">Área de trabajo</p>
  <div style="background:#f0f0f0; padding:8px; border-radius:12px; margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap;">
    <button class="btn" id="btnTabla">Tabla</button>
    <button class="btn" id="btnNota">Nota</button>
    <button class="btn" id="btnGrafico">Gráfico</button>
    <button class="btn" id="btnFactura">Factura</button>
    <button class="btn" id="btnFunciones">fx Funciones</button>
    <button class="btn btn-primary" id="btnGuardar">Guardar</button>
  </div>
  <div class="canvas" id="canvas"></div>
</div>

<!-- MODALES (simplificados) -->
<div class="modal" id="modalFactura"><div class="modal-content">Factura Electrónica</div></div>
<div class="modal" id="modalPlantillas"><div class="modal-content">Plantillas</div></div>

<!-- SIBO -->
<div class="sibo-chat" id="siboChat">
  <div id="siboMessages" style="padding:14px; flex:1; overflow-y:auto;">
    <div class="sibo-msg bot">¡Pura vida! Soy Sibö ✦. ¿En qué te ayudo?</div>
  </div>
  <div style="padding:12px; border-top:1.5px solid var(--border); display:flex;">
    <input type="text" id="siboInput" placeholder="Escribe aquí..." style="flex:1; padding:10px;">
    <button class="btn btn-primary" onclick="sendSibo()">Enviar</button>
  </div>
</div>

<script>
// ==================== i18n MEJORADO (mantiene todo lo tuyo) ====================
const translations = { /* ← PEGA AQUÍ TODO tu objeto translations original completo */ };

// (Mantén exactamente el mismo objeto translations que tenías antes)

let currentLang = localStorage.getItem('lang') || 'es';

function t(key) {
  const lang = translations[currentLang] || translations.es;
  return lang[key] || translations.es[key] || key;
}

const i18nMap = {
  'logo.name': { sel: '.logo h1', prop: 'textContent' },
  'btn.sibo': { id: 'btnSibo', prop: 'textContent' },
  'hero.badge': { sel: '.hero-badge', prop: 'textContent' },
  'hero.title.span': { sel: '.hero h2 span', prop: 'textContent' },
  'hero.desc': { sel: '.hero > p', prop: 'textContent' },
  'hero.start': { id: 'btnEmpezar', prop: 'textContent' },
  'hero.templates': { id: 'btnPlantillas', prop: 'textContent' },
  'canvas.label': { sel: '.canvas-label', prop: 'textContent' },

  'btn.tabla': { id: 'btnTabla', prop: 'btnText' },
  'btn.nota': { id: 'btnNota', prop: 'btnText' },
  'btn.grafico': { id: 'btnGrafico', prop: 'btnText' },
  'btn.plantillas2': { id: 'btnPlantillas2', prop: 'btnText' },
  'btn.factura': { id: 'btnFactura', prop: 'btnText' },
  'btn.exportar': { id: 'btnExportar', prop: 'btnText' },
  'btn.guardar': { id: 'btnGuardar', prop: 'btnText' },
  'btn.funciones': { id: 'btnFunciones', prop: 'btnText' },

  'modal.factura.title': { sel: '#modalFactura .modal-header h3', prop: 'textContent' },
  'templates.title': { sel: '#modalPlantillas .modal-header h3', prop: 'textContent' },
  'sibo.placeholder': { id: 'siboInput', prop: 'placeholder' },
  'credit': { id: 'credit', prop: 'textContent' }
};

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('lang', lang);
  document.getElementById('langSelect').value = lang;

  const trs = translations[lang] || translations.es;

  Object.entries(i18nMap).forEach(([key, cfg]) => {
    const val = trs[key] || translations.es[key];
    if (!val) return;
    const el = cfg.id ? document.getElementById(cfg.id) : document.querySelector(cfg.sel);
    if (!el) return;

    if (cfg.prop === 'btnText') {
      const svg = el.querySelector('svg');
      el.textContent = val;
      if (svg) el.prepend(svg);
    } else {
      el[cfg.prop] = val;
    }
  });

  // Hero
  const heroH2 = document.querySelector('.hero h2');
  if (heroH2) {
    const spanText = trs['hero.title.span'] || 'Matriz Contable';
    heroH2.innerHTML = `<span>${spanText}</span> CR v12`;
  }
}

// ==================== CANVAS MEJORADO ====================
const canvas = document.getElementById('canvas');
let historyStack = [];
let historyIndex = -1;

function saveHistory() {
  historyStack = historyStack.slice(0, historyIndex + 1);
  historyStack.push(canvas.innerHTML);
  historyIndex++;
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    canvas.innerHTML = historyStack[historyIndex];
    attachTableListeners();
  }
}

function redo() {
  if (historyIndex < historyStack.length - 1) {
    historyIndex++;
    canvas.innerHTML = historyStack[historyIndex];
    attachTableListeners();
  }
}

function parseFormula(cell) {
  let txt = cell.textContent.trim();
  if (!txt.startsWith('=')) return null;
  let expr = txt.slice(1).toUpperCase().trim();
  try {
    if (expr.startsWith('SUMA') || expr.startsWith('SUM')) {
      let sum = 0;
      const table = cell.closest('table');
      if (table) {
        table.querySelectorAll('td[contenteditable="true"]').forEach(td => {
          const n = parseFloat(td.textContent);
          if (!isNaN(n)) sum += n;
        });
      }
      return sum.toFixed(2);
    }
    if (expr.includes('IVA')) {
      const val = parseFloat(cell.previousElementSibling?.textContent || 0);
      return (val * 0.13).toFixed(2);
    }
    return eval(expr);
  } catch(e) { return '#ERROR'; }
}

function attachTableListeners() {
  canvas.querySelectorAll('td[contenteditable="true"]').forEach(td => {
    td.onblur = () => {
      const result = parseFormula(td);
      if (result !== null) td.textContent = result;
      saveHistory();
    };
  });
}

function addWidget(html) {
  const div = document.createElement('div');
  div.style.margin = '12px 0';
  div.innerHTML = html;
  canvas.appendChild(div);
  saveHistory();
  attachTableListeners();
}

// ==================== BOTONES ====================
document.getElementById('btnTabla').addEventListener('click', () => addWidget(`
  <table class="table">
    <thead><tr><th>Fecha</th><th>Cuenta</th><th>Debe (₡)</th><th>Haber (₡)</th></tr></thead>
    <tbody><tr><td contenteditable="true">2026-06-07</td><td contenteditable="true">Caja</td><td contenteditable="true">56500</td><td contenteditable="true"></td></tr></tbody>
  </table>
`));

document.getElementById('btnNota').addEventListener('click', () => addWidget(`
  <div style="background:var(--bg3); border:1.5px solid var(--border2); border-radius:12px; padding:16px;" contenteditable="true">📝 Nueva nota contable...</div>
`));

document.getElementById('btnGuardar').addEventListener('click', () => {
  localStorage.setItem('canvasData_v12', canvas.innerHTML);
  const btn = document.getElementById('btnGuardar');
  const orig = btn.innerHTML;
  btn.textContent = '✓ Guardado';
  setTimeout(() => { btn.innerHTML = orig; setLang(currentLang); }, 1400);
});

// Undo / Redo
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
});

// ==================== INICIO ====================
document.getElementById('langSelect').addEventListener('change', e => setLang(e.target.value));
setLang(currentLang);

const saved = localStorage.getItem('canvasData_v12');
if (saved) canvas.innerHTML = saved;

saveHistory();
attachTableListeners();

console.log('✅ Matriz Contable CR v12 - Versión Corregida');
</script>
</body>
</html>
