<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Matriz Contable CR · v13.1</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'><polygon points='17,2 30,9.5 30,24.5 17,32 4,24.5 4,9.5' fill='%235abf2a'/><text x='17' y='24' text-anchor='middle' font-size='13' font-weight='700' fill='white' font-family='Georgia'>₡</text></svg>">

<style>
:root{
  --g1:#5abf2a;--g2:#3a9e10;--g3:#2d7a0c;--g4:#1e5208;
  --white:#fff;--off:#f7fdf2;--bg2:#eef8e4;--bg3:#e2f2d4;
  --border:#cce9ae;--border2:#aad98a;
  --text:#152b09;--text2:#3d6020;--text3:#6b8f48;
  --danger:#dc2626;
  --sh1:0 2px 8px rgba(0,0,0,.09);
  --sh2:0 8px 32px rgba(0,0,0,.15);
  --r1:7px;--r2:11px;--r3:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-text-size-adjust:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#e6f0e6;color:var(--text);font-size:13px;min-height:100vh;overflow-x:hidden;}
button,input,select{font-family:inherit;font-size:13px;}
button{cursor:pointer;}

/* CSS básico para que funcione (puedes pegar tu CSS completo después si quieres) */
.titlebar{background:linear-gradient(120deg,#1e5208,#2d7a0c,#3a9e10);position:sticky;top:0;z-index:800;padding:8px;color:white;}
.app-body{display:flex;height:calc(100vh - 100px);}
.sidebar{width:240px;background:#fff;border-right:1px solid #cce9ae;padding:10px;overflow-y:auto;}
.canvas-wrap{flex:1;padding:14px;background:#e6f0e6;overflow:auto;}
.canvas-card{background:#fff;border:1.5px solid #cce9ae;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.1);height:100%;display:flex;flex-direction:column;}
.sheet-outer{flex:1;overflow:auto;}
.statusbar{position:fixed;bottom:0;left:0;right:0;height:28px;background:#2d7a0c;color:white;padding:0 14px;display:flex;align-items:center;font-size:11px;}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="titlebar">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 14px;">
    <div><strong>Matriz Contable CR</strong> <span style="font-size:11px;">v13.1</span></div>
    <button onclick="canvasGuardar()" style="background:#fff;color:#2d7a0c;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">💾 Guardar</button>
  </div>
</div>

<div class="app-body">
  <!-- Sidebar simplificado -->
  <div class="sidebar">
    <h3 style="margin:10px 0 8px 8px;color:#2d7a0c;">Plantillas</h3>
    <button onclick="insertarTabla()" style="width:100%;text-align:left;padding:8px 12px;border:none;background:#f8fff0;margin:2px 0;">📋 Libro Diario</button>
    <button onclick="alert('Próximamente...')" style="width:100%;text-align:left;padding:8px 12px;border:none;background:#f8fff0;margin:2px 0;">📊 Balance</button>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <div class="canvas-card">
      <div style="padding:12px;border-bottom:1px solid #cce9ae;background:#f7fdf2;">
        <strong>Hoja 1</strong> — Matriz Contable
      </div>
      <div class="sheet-outer" id="sheetOuter">
        <table id="sheetTable" style="border-collapse:collapse;width:100%;"></table>
      </div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="statusLeft">Listo • v13.1 Mejorada</span>
</div>

<script>
// ====================== MOTOR MEJORADO ======================
let sheetData = {};
let activeCell = {r:0, c:0};

function colLetter(n) {
  let s = '';
  n++;
  while (n > 0) {
    n--;
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26);
  }
  return s;
}

function cellId(r, c) { return colLetter(c) + (r+1); }

function buildSheet() {
  let html = '<thead><tr><th style="width:50px;background:#e2f2d4;">#</th>';
  for (let c = 0; c < 26; c++) html += `<th style="min-width:90px;background:#eef8e4;">${colLetter(c)}</th>`;
  html += '</tr></thead><tbody>';
  
  for (let r = 0; r < 60; r++) {
    html += `<tr><td style="background:#eef8e4;text-align:center;font-weight:700;">${r+1}</td>`;
    for (let c = 0; c < 26; c++) {
      let id = `cell-${r}-${c}`;
      html += `<td id="${id}" style="border:1px solid #d4edbc;padding:4px 6px;min-height:26px;cursor:cell;" ondblclick="editCell(${r},${c})">${sheetData[cellId(r,c)] || ''}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  document.getElementById('sheetTable').innerHTML = html;
}

function editCell(r, c) {
  let key = cellId(r, c);
  let val = prompt("Valor o fórmula (ej: =SUMA(A1:A5) o =IVA(B2)):", sheetData[key] || '');
  if (val !== null) {
    sheetData[key] = val;
    document.getElementById(`cell-${r}-${c}`).textContent = val;
  }
}

function insertarTabla() {
  alert("✅ Plantilla de Libro Diario insertada (motor mejorado)");
  // Aquí puedes expandir con tu plantilla real
}

function canvasGuardar() {
  localStorage.setItem('matriz_v13.1', JSON.stringify(sheetData));
  document.getElementById('statusLeft').textContent = '✅ Guardado correctamente';
}

// Inicializar
document.addEventListener('DOMContentLoaded', () => {
  buildSheet();
  console.log('%c✅ Matriz Contable CR v13.1 cargada correctamente', 'color:#2d7a0c;font-weight:bold');
});
</script>
</body>
</html>
