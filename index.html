// ── loadTemplate ─────────────────────────────────────
function loadTemplate(tipo) {
  var hoy = new Date().toLocaleDateString('es-CR');
  var r = activeCell ? activeCell.r : 0;
  var c = activeCell ? activeCell.c : 0;

  function set(row, col, val) {
    var key = cellId(row, col);
    sheetData[key] = val;
  }

  function head(row, cols) {
    cols.forEach(function(h, i) { set(row, c + i, h); });
  }

  // Limpiar zona de trabajo (20 filas x 10 cols desde posición activa)
  for (var ri = r; ri < r + 22; ri++)
    for (var ci = c; ci < c + 11; ci++)
      delete sheetData[cellId(ri, ci)];

  if (tipo === 'diario') {
    set(r, c, '📘 LIBRO DIARIO');
    head(r + 1, ['Fecha', 'N° Asiento', 'Código', 'Cuenta', 'Debe (₡)', 'Haber (₡)', 'Ref.']);
    var rows = [
      [hoy, '001', '1.1.01', 'Caja y Bancos',     '56500',  '',      'F-001'],
      [hoy, '001', '4.1.01', 'Ventas',             '',       '50000', 'F-001'],
      [hoy, '001', '2.1.05', 'IVA por Pagar',      '',       '6500',  '13%'],
      [hoy, '002', '1.1.01', 'Caja y Bancos',      '23200',  '',      'F-002'],
      [hoy, '002', '4.1.01', 'Ventas',             '',       '20000', 'F-002'],
      [hoy, '002', '2.1.05', 'IVA por Pagar',      '',       '3200',  '13%'],
    ];
    rows.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 2 + i, c + j, v); });
    });
    set(r + 8, c + 3, 'TOTALES');
    set(r + 8, c + 4, '=SUMA(' + cellId(r+2,c+4) + ':' + cellId(r+7,c+4) + ')');
    set(r + 8, c + 5, '=SUMA(' + cellId(r+2,c+5) + ':' + cellId(r+7,c+5) + ')');

  } else if (tipo === 'mayor') {
    set(r, c, '📗 LIBRO MAYOR — Caja y Bancos (1.1.01)');
    head(r + 1, ['Fecha', 'Descripción', 'Ref.', 'Debe (₡)', 'Haber (₡)', 'Saldo (₡)']);
    var mrows = [
      [hoy, 'Saldo inicial',  '',      '',      '',      '0'],
      [hoy, 'Venta F-001',    'F-001', '56500', '',      '56500'],
      [hoy, 'Venta F-002',    'F-002', '23200', '',      '79700'],
      [hoy, 'Pago proveedor', 'C-001', '',      '15000', '64700'],
    ];
    mrows.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 2 + i, c + j, v); });
    });
    set(r + 6, c + 2, 'TOTALES');
    set(r + 6, c + 3, '=SUMA(' + cellId(r+2,c+3) + ':' + cellId(r+5,c+3) + ')');
    set(r + 6, c + 4, '=SUMA(' + cellId(r+2,c+4) + ':' + cellId(r+5,c+4) + ')');

  } else if (tipo === 'balance') {
    set(r, c, '📊 BALANCE DE COMPROBACIÓN');
    head(r + 1, ['Código', 'Cuenta', 'Nat.', 'Débitos (₡)', 'Créditos (₡)', 'Saldo D (₡)', 'Saldo A (₡)']);
    var brows = [
      ['1.1.01', 'Caja y Bancos',   'D', '79700',  '15000', '64700', ''],
      ['1.2.01', 'Clientes',         'D', '30000',  '',      '30000', ''],
      ['2.1.01', 'Proveedores',      'A', '',        '20000', '',      '20000'],
      ['2.1.05', 'IVA por Pagar',    'A', '',        '9700',  '',      '9700'],
      ['4.1.01', 'Ventas',           'A', '',        '70000', '',      '70000'],
      ['5.1.01', 'Costo de Ventas',  'D', '40000',  '',      '40000', ''],
    ];
    brows.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 2 + i, c + j, v); });
    });
    set(r + 8, c + 1, 'TOTALES');
    set(r + 8, c + 3, '=SUMA(' + cellId(r+2,c+3) + ':' + cellId(r+7,c+3) + ')');
    set(r + 8, c + 4, '=SUMA(' + cellId(r+2,c+4) + ':' + cellId(r+7,c+4) + ')');
    set(r + 8, c + 5, '=SUMA(' + cellId(r+2,c+5) + ':' + cellId(r+7,c+5) + ')');
    set(r + 8, c + 6, '=SUMA(' + cellId(r+2,c+6) + ':' + cellId(r+7,c+6) + ')');

  } else if (tipo === 'conciliacion') {
    set(r, c, '🏦 CONCILIACIÓN BANCARIA');
    set(r + 1, c, 'SEGÚN BANCO');
    head(r + 2, ['Concepto', 'Monto (₡)']);
    var banco = [
      ['Saldo según estado de cuenta', '95000'],
      ['(+) Depósitos en tránsito',     '20000'],
      ['(-) Cheques pendientes',         '-5000'],
      ['(=) Saldo ajustado banco',       '=SUMA(' + cellId(r+3,c+1) + ':' + cellId(r+5,c+1) + ')'],
    ];
    banco.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 3 + i, c + j, v); });
    });
    set(r + 8, c, 'SEGÚN LIBROS');
    head(r + 9, ['Concepto', 'Monto (₡)']);
    var libros = [
      ['Saldo según libros',    '108000'],
      ['(+) Notas de crédito',  '5000'],
      ['(-) Notas de débito',   '-3000'],
      ['(=) Saldo ajustado',    '=SUMA(' + cellId(r+10,c+1) + ':' + cellId(r+12,c+1) + ')'],
    ];
    libros.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 10 + i, c + j, v); });
    });

  } else if (tipo === 'compras') {
    set(r, c, '🛒 D-151 COMPRAS Y VENTAS');
    head(r + 1, ['Fecha', 'Tipo', 'N° Doc.', 'Cédula', 'Nombre', 'Condición', 'Subtotal (₡)', 'IVA (₡)', 'Total (₡)']);
    var drows = [
      [hoy, 'FE', '001-001-000001', '3-101-000000', 'Cliente A S.A.',  'Contado', '50000', '6500',  '56500'],
      [hoy, 'FE', '001-001-000002', '1-234-567890', 'Juan Pérez',      'Crédito', '20000', '2600',  '22600'],
      [hoy, 'FC', '001-002-000001', '3-102-111222', 'Proveedor B S.A.','Contado', '35000', '4550',  '39550'],
    ];
    drows.forEach(function(row, i) {
      row.forEach(function(v, j) { set(r + 2 + i, c + j, v); });
    });
    set(r + 5, c + 5, 'TOTALES');
    set(r + 5, c + 6, '=SUMA(' + cellId(r+2,c+6) + ':' + cellId(r+4,c+6) + ')');
    set(r + 5, c + 7, '=SUMA(' + cellId(r+2,c+7) + ':' + cellId(r+4,c+7) + ')');
    set(r + 5, c + 8, '=SUMA(' + cellId(r+2,c+8) + ':' + cellId(r+4,c+8) + ')');

  } else if (tipo === 'factura') {
    openModal('modalFactura');
    return;
  }

  renderAllCells();
  activateCell(r, c);
  var sl = document.getElementById('statusLeft');
  if (sl) sl.textContent = 'Plantilla cargada: ' + tipo;
}

// ── insertarTabla ─────────────────────────────────────
function insertarTabla() {
  sheetInsertTable();
}

// ── insertarNota ──────────────────────────────────────
function insertarNota() {
  var key = cellId(activeCell.r, activeCell.c);
  var nota = prompt('Texto de la nota:', '📝 Nota contable...');
  if (nota !== null && nota.trim() !== '') {
    sheetData[key] = nota;
    renderCell(activeCell.r, activeCell.c);
    activateCell(activeCell.r, activeCell.c);
    var fi = document.getElementById('formulaInput');
    if (fi) fi.value = nota;
    var sl = document.getElementById('statusLeft');
    if (sl) sl.textContent = 'Nota insertada en ' + key;
  }
}

// ── insertarGrafico ───────────────────────────────────
function insertarGrafico() {
  // Toma datos de la columna activa (filas 1 a 8) y dibuja gráfico flotante
  var col = activeCell ? activeCell.c : 0;
  var labels = [], values = [];

  for (var ri = 0; ri < 8; ri++) {
    var labelKey = cellId(ri, col > 0 ? col - 1 : col);
    var valKey   = cellId(ri, col);
    var val      = sheetData[valKey] || '';
    var num      = parseFloat(String(val).replace(/[,₡\s]/g, ''));
    if (!isNaN(num) && num !== 0) {
      labels.push(sheetData[labelKey] || cellId(ri, col));
      values.push(num);
    }
  }

  if (values.length === 0) {
    // Sin datos — grafico demo
    labels = ['Ventas', 'Compras', 'IVA', 'Gastos'];
    values = [70000, 35000, 9700, 15000];
  }

  var id = 'chart_' + Date.now();
  var max = Math.max.apply(null, values) || 1;
  var barW = Math.min(48, Math.floor(320 / (values.length + 1)));
  var colors = ['#5abf2a','#3a9e10','#1e5208','#7fff4a','#2d7a0c','#52b826'];

  var wrap = document.createElement('div');
  wrap.style.cssText = [
    'position:fixed',
    'top:50%', 'left:50%',
    'transform:translate(-50%,-50%)',
    'z-index:9999',
    'background:#fff',
    'border:2px solid var(--border2)',
    'border-radius:16px',
    'padding:16px 18px',
    'box-shadow:0 12px 48px rgba(0,0,0,.22)',
    'min-width:380px'
  ].join(';');

  wrap.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
      '<span style="font-size:13px;font-weight:700;color:var(--g3);">📊 Gráfico de Barras</span>' +
      '<button onclick="this.closest(\'div[style]\').remove()" style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;cursor:pointer;font-size:13px;color:var(--text2);">✕ Cerrar</button>' +
    '</div>' +
    '<canvas id="' + id + '" width="360" height="200" style="display:block;"></canvas>' +
    '<div id="' + id + '_legend" style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;"></div>';

  document.body.appendChild(wrap);

  var cvs = document.getElementById(id);
  var ctx = cvs.getContext('2d');
  var chartH = 160, offsetY = 10, offsetX = 40;
  var totalW = 360 - offsetX - 10;
  var bw = Math.floor(totalW / values.length) - 6;

  // Grid lines
  ctx.strokeStyle = '#e2f2d4';
  ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = offsetY + chartH - (g / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(offsetX, gy); ctx.lineTo(360 - 10, gy); ctx.stroke();
    ctx.fillStyle = '#6b8f48'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round((max * g / 4)).toLocaleString('es-CR'), offsetX - 3, gy + 3);
  }

  // Bars
  values.forEach(function(v, i) {
    var h = (v / max) * chartH;
    var x = offsetX + i * (bw + 6);
    var y = offsetY + chartH - h;
    ctx.fillStyle = colors[i % colors.length];
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(x, y, bw, h, [4, 4, 0, 0]) : ctx.rect(x, y, bw, h);
    ctx.fill();
    // Value on top
    ctx.fillStyle = '#1e5208'; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v >= 1000 ? (v/1000).toFixed(1)+'K' : v, x + bw/2, y - 3);
    // Label below
    ctx.fillStyle = '#3d6020'; ctx.font = '9px sans-serif';
    var lbl = (labels[i] || '').toString().substring(0, 8);
    ctx.fillText(lbl, x + bw/2, offsetY + chartH + 14);
  });

  // Legend
  var legEl = document.getElementById(id + '_legend');
  if (legEl) {
    values.forEach(function(v, i) {
      var span = document.createElement('span');
      span.style.cssText = 'font-size:10px;display:flex;align-items:center;gap:3px;color:var(--text2);';
      span.innerHTML = '<span style="width:10px;height:10px;border-radius:2px;background:' + colors[i % colors.length] + ';display:inline-block;"></span>' +
        (labels[i] || '').toString().substring(0, 12) + ': ' + Number(v).toLocaleString('es-CR');
      legEl.appendChild(span);
    });
  }

  var sl = document.getElementById('statusLeft');
  if (sl) sl.textContent = 'Gráfico generado (' + values.length + ' series)';
}

// ── agregarFilaPlantilla ──────────────────────────────
function agregarFilaPlantilla() {
  // Busca la última fila con datos en la columna activa y agrega una fila vacía
  var col = activeCell ? activeCell.c : 0;
  var lastRow = activeCell ? activeCell.r : 0;

  // Encuentra la última fila usada cercana a la posición activa
  for (var ri = lastRow; ri < SHEET_ROWS; ri++) {
    var hasData = false;
    for (var ci = col; ci < col + 10; ci++) {
      if (sheetData[cellId(ri, ci)]) { hasData = true; break; }
    }
    if (!hasData) { lastRow = ri; break; }
  }

  // Detecta número de columnas del bloque (buscando encabezados arriba)
  var numCols = 0;
  for (var check = lastRow - 1; check >= 0; check--) {
    for (var cc = col; cc < col + 12; cc++) {
      if (sheetData[cellId(check, cc)]) numCols = Math.max(numCols, cc - col + 1);
    }
    if (numCols > 0) break;
  }
  if (numCols === 0) numCols = 6;

  // Inserta una fila vacía con la fecha en primera columna
  sheetData[cellId(lastRow, col)] = new Date().toLocaleDateString('es-CR');
  for (var nc = 1; nc < numCols; nc++) {
    sheetData[cellId(lastRow, col + nc)] = '';
  }

  renderAllCells();
  activateCell(lastRow, col);
  var sl = document.getElementById('statusLeft');
  if (sl) sl.textContent = 'Fila agregada en fila ' + (lastRow + 1);
}

// ── eliminarFilaPlantilla ─────────────────────────────
function eliminarFilaPlantilla() {
  var col = activeCell ? activeCell.c : 0;
  var targetRow = activeCell ? activeCell.r : 0;

  // Verifica que no sea encabezado (primera fila de datos)
  var keys = Object.keys(sheetData).filter(function(k) {
    var m = k.match(/[A-Z]+(\d+)/);
    return m && parseInt(m[1]) - 1 === targetRow;
  });

  if (keys.length === 0) {
    var sl = document.getElementById('statusLeft');
    if (sl) sl.textContent = 'Fila ' + (targetRow+1) + ' ya está vacía';
    return;
  }

  if (!confirm('Eliminar fila ' + (targetRow + 1) + '?')) return;

  // Borra la fila activa y desplaza las siguientes hacia arriba
  for (var ri = targetRow; ri < SHEET_ROWS - 1; ri++) {
    for (var ci = 0; ci < SHEET_COLS; ci++) {
      var nextKey = cellId(ri + 1, ci);
      var curKey  = cellId(ri, ci);
      if (sheetData[nextKey]) {
        sheetData[curKey] = sheetData[nextKey];
      } else {
        delete sheetData[curKey];
      }
    }
  }
  // Limpia la última fila
  for (var lc = 0; lc < SHEET_COLS; lc++) {
    delete sheetData[cellId(SHEET_ROWS - 1, lc)];
  }

  renderAllCells();
  activateCell(Math.max(0, targetRow - 1), col);
  var sl2 = document.getElementById('statusLeft');
  if (sl2) sl2.textContent = 'Fila ' + (targetRow + 1) + ' eliminada';
}

// ── calcularTotales ───────────────────────────────────
function calcularTotales() {
  // Suma cada columna numérica y pone el total en la primera fila vacía
  var startRow = activeCell ? activeCell.r : 0;
  var startCol = activeCell ? activeCell.c : 0;

  // Determina rango del bloque: busca filas con datos
  var endRow = startRow;
  for (var ri = startRow; ri < SHEET_ROWS; ri++) {
    var rowHasData = false;
    for (var ci = startCol; ci < startCol + 12; ci++) {
      if (sheetData[cellId(ri, ci)]) { rowHasData = true; break; }
    }
    if (rowHasData) endRow = ri;
    else if (ri > startRow + 1) break;
  }

  // Determina número de columnas
  var numCols = 0;
  for (var ri2 = startRow; ri2 <= endRow; ri2++) {
    for (var ci2 = startCol; ci2 < startCol + 12; ci2++) {
      if (sheetData[cellId(ri2, ci2)]) numCols = Math.max(numCols, ci2 - startCol + 1);
    }
  }

  var totalRow = endRow + 1;
  sheetData[cellId(totalRow, startCol)] = 'TOTAL';

  var added = 0;
  for (var nc = 1; nc < numCols; nc++) {
    // Verifica si la columna tiene números
    var hasNums = false;
    for (var ri3 = startRow; ri3 <= endRow; ri3++) {
      var v = sheetData[cellId(ri3, startCol + nc)] || '';
      if (v && !isNaN(parseFloat(String(v).replace(/[,₡\s]/g, '')))) { hasNums = true; break; }
    }
    if (hasNums) {
      var from = cellId(startRow, startCol + nc);
      var to   = cellId(endRow,   startCol + nc);
      sheetData[cellId(totalRow, startCol + nc)] = '=SUMA(' + from + ':' + to + ')';
      added++;
    }
  }

  renderAllCells();
  activateCell(totalRow, startCol);
  var sl = document.getElementById('statusLeft');
  if (sl) sl.textContent = 'Totales calculados (' + added + ' columnas)';
}

// ── exportarCSV ───────────────────────────────────────
function exportarCSV() {
  var csv = '';
  var maxRow = 0, maxCol = 0;

  // Determina dimensiones reales usadas
  Object.keys(sheetData).forEach(function(key) {
    var m = key.match(/([A-Z]+)(\d+)/);
    if (m) {
      var r = parseInt(m[2]) - 1;
      var col = colIndex(m[1]);
      if (r > maxRow) maxRow = r;
      if (col > maxCol) maxCol = col;
    }
  });

  if (maxRow === 0 && maxCol === 0 && Object.keys(sheetData).length === 0) {
    alert('No hay datos en la hoja para exportar.');
    return;
  }

  for (var ri = 0; ri <= maxRow; ri++) {
    var rowParts = [];
    for (var ci = 0; ci <= maxCol; ci++) {
      var key = cellId(ri, ci);
      var val = sheetData[key] || '';
      // Si es fórmula, evalúa el resultado
      if (val.startsWith('=')) {
        val = String(evalFormula(val, ri, ci));
      }
      rowParts.push('"' + String(val).replace(/"/g, '""') + '"');
    }
    csv += rowParts.join(',') + '\n';
  }

  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'MatrizContableCR_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);

  var sl = document.getElementById('statusLeft');
  if (sl) sl.textContent = 'CSV exportado (' + (maxRow + 1) + ' filas)';
}
